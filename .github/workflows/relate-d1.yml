name: relate-d1

on:
  push:
    branches: [main]
    paths:
      - 'packages/relate-d1/**'
      - 'packages/relate/**'
  pull_request:
    paths:
      - 'packages/relate-d1/**'
      - 'packages/relate/**'

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm --filter @nokto-labs/relate build
      - run: pnpm --filter @nokto-labs/relate-d1 build
      - run: pnpm --filter @nokto-labs/relate-d1 typecheck
      - run: pnpm vitest run packages/relate-d1

  publish:
    needs: test
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          registry-url: https://registry.npmjs.org
      - run: pnpm install --frozen-lockfile
      - run: pnpm --filter @nokto-labs/relate build
      - run: pnpm --filter @nokto-labs/relate-d1 publish --no-git-checks --provenance
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
